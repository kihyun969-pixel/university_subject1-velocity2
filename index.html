<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PM Safety Dashboard</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
        }
        body {
            background-color: #f5f5f7;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
        }
        .container {
            background-color: #ffffff;
            padding: 35px 30px;
            border-radius: 32px;
            width: 100%;
            max-width: 380px;
            text-align: center;
            box-shadow: 0 10px 40px rgba(0,0,0,0.03);
        }
        @media (min-width: 600px) {
            .container {
                max-width: 600px;
                padding: 40px;
            }
        }
        
        /* 속도 레이아웃 */
        .speed-section {
            margin-bottom: 25px;
        }
        .speed-row {
            display: flex;
            justify-content: center;
            align-items: flex-end;
            width: 100%;
        }
        .speed-box {
            padding: 0 20px;
        }
        .safe-speed-box {
            border-left: 1px solid #e5e5ea;
        }
        .label {
            font-size: 13px;
            font-weight: 600;
            color: #86868b;
            margin-bottom: 8px;
            display: block;
        }
        .current-speed {
            font-size: 110px;
            font-weight: 800;
            color: #1d1d1f;
            letter-spacing: -4px;
            line-height: 100px;
        }
        .safe-speed {
            font-size: 55px;
            font-weight: 700;
            color: #ff3b30;
            letter-spacing: -2px;
            line-height: 55px;
        }
        .unit {
            font-size: 18px;
            font-weight: 700;
            color: #1d1d1f;
            margin-top: 12px;
        }

        /* 상태 아이콘 섹션 */
        .status-icon-section {
            display: flex;
            justify-content: center;
            width: 100%;
            margin-bottom: 35px;
            border-top: 1px solid #f2f2f7;
            border-bottom: 1px solid #f2f2f7;
            padding: 25px 0;
        }
        .icon-widget {
            margin: 0 25px;
            text-align: center;
        }
        .icon-svg {
            width: 32px;
            height: 32px;
            margin-bottom: 8px;
            transition: fill 0.3s ease, filter 0.3s ease;
        }
        .status-label {
            font-size: 12px;
            font-weight: 600;
            color: #a1a1a6;
        }

        /* 애플 스타일 버튼 */
        .btn {
            background-color: #0071e3;
            color: #ffffff;
            border: none;
            padding: 14px 40px;
            font-size: 15px;
            font-weight: 600;
            border-radius: 980px;
            cursor: pointer;
            transition: background-color 0.2s ease;
        }
        .btn:active {
            background-color: #005bb5;
        }
        .status-log {
            font-size: 12px;
            color: #86868b;
            margin-top: 14px;
        }
        /* 개발 데이터 모니터링 디버그 창 */
        .debug-panel {
            margin-top: 15px;
            font-size: 11px;
            color: #c1c1c6;
            font-family: monospace;
        }
    </style>
</head>
<body>

    <div class="container">
        
        <div class="speed-section">
            <div class="speed-row">
                <div class="speed-box">
                    <span class="label">현재 속도</span>
                    <div id="currentSpeed" class="current-speed">--</div>
                </div>
                <div class="speed-box safe-speed-box">
                    <span class="label">안전 속도</span>
                    <div id="safeSpeed" class="safe-speed">--</div>
                </div>
            </div>
            <div class="unit">km/h</div>
        </div>

        <div class="status-icon-section">
            <div class="icon-widget">
                <svg id="lightIcon" class="icon-svg" viewBox="0 0 24 24" fill="#8e8e93">
                    <path d="M12 2C8.14 2 5 5.14 5 9c0 2.38 1.19 4.47 3 5.74V17c0 .55.45 1 1 1h6c.55 0 1-.45 1-1v-2.26c1.81-1.27 3-3.36 3-5.74 0-3.86-3.14-7-7-7zm2.5 19H9.5c-.55 0-1 .45-1 1s.45 1 1 1h5c.55 0 1-.45 1-1s-.45-1-1-1z"/>
                </svg>
                <div class="status-label">환경</div>
            </div>

            <div class="icon-widget">
                <svg id="rainIcon" class="icon-svg" viewBox="0 0 24 24" fill="#8e8e93">
                    <path d="M12 2.69l5.66 5.66a8 8 0 1 1-11.31 0z"/>
                </svg>
                <div class="status-label">강수</div>
            </div>

            <div class="icon-widget">
                <svg id="slipIcon" class="icon-svg" viewBox="0 0 24 24" fill="#8e8e93">
                    <path d="M1 21h22L12 2 1 21zm12-3h-2v-2h2v2zm0-4h-2v-4h2v4z"/>
                </svg>
                <div class="status-label">노면</div>
            </div>
        </div>

        <button id="connectBtn" class="btn" onclick="connectBLE()">블루투스 연결</button>
        <div id="statusLog" class="status-log">Wait for connection...</div>
        <div id="debugData" class="debug-panel">Raw Data: None</div>

    </div>

    <script>
        let characteristic = null;

        async function connectBLE() {
            const statusLog = document.getElementById('statusLog');
            const connectBtn = document.getElementById('connectBtn');
            statusLog.innerText = 'Scanning...';
            
            try {
                const device = await navigator.bluetooth.requestDevice({
                    filters: [{ services: ['0000ffe0-0000-1000-8000-00805f9b34fb'] }]
                });
                
                statusLog.innerText = 'Connecting...';
                const server = await device.gatt.connect();
                const service = await server.getPrimaryService('0000ffe0-0000-1000-8000-00805f9b34fb');
                characteristic = await service.getCharacteristic('0000ffe1-0000-1000-8000-00805f9b34fb');
                
                statusLog.innerText = 'Connected!';
                connectBtn.innerText = '시스템 가동 중';
                connectBtn.style.backgroundColor = '#34c759';

                await characteristic.startNotifications();
                characteristic.addEventListener('characteristicvaluechanged', handleDataChanged);
                
            } catch (error) {
                statusLog.innerText = 'Error: ' + error.message;
            }
        }

        function handleDataChanged(event) {
            const value = event.target.value;
            const decoder = new TextDecoder('utf-8');
            const decodedData = decoder.decode(value).trim();
            
            // 디버깅용 로그 기록 출력 (센서 데이터 확인용)
            document.getElementById('debugData').innerText = "Raw Data: " + decodedData;
            
            const dataArray = decodedData.split(',');
            
            if (dataArray.length >= 5) {
                const safeSpeed = dataArray[0];
                const currentSpeed = dataArray[1];
                const lightVal = Number(dataArray[2]);
                const rainVal = dataArray[3].trim();
                const slipVal = dataArray[4].trim();

                // 1. 속도 필드 동적 바인딩
                document.getElementById('safeSpeed').innerText = safeSpeed;
                document.getElementById('currentSpeed').innerText = currentSpeed;

                // 2. 조도(환경) 시스템 제어 로직
                const lightIcon = document.getElementById('lightIcon');
                if (lightVal == 1) {
                    lightIcon.style.fill = '#ff3b30'; // 밤: 빨간색 전구 온!
                    lightIcon.style.filter = 'drop-shadow(0 0 6px rgba(255,59,48,0.6))'; // 빛나는 발광 효과 추가
                } else {
                    lightIcon.style.fill = '#8e8e93'; // 낮: 차분한 회색 기본 컬러
                    lightIcon.style.filter = 'none';
                }

                // 3. 강수(비) 시스템 제어 로직
                const rainIcon = document.getElementById('rainIcon');
                if (rainVal === '1') {
                    rainIcon.style.fill = '#007aff'; // 비 옴: 파란색 물방울!
                    rainIcon.style.filter = 'drop-shadow(0 0 6px rgba(0,122,255,0.5))';
                } else {
                    rainIcon.style.fill = '#8e8e93'; // 평소: 회색 물방울
                    rainIcon.style.filter = 'none';
                }

                // 4. 노면 미끄러움 레벨 세팅
                const slipIcon = document.getElementById('slipIcon');
                if (slipVal === '1') {
                    slipIcon.style.fill = '#ffcc00'; // 약간 미끄러움: 노란색
                } else if (slipVal === '2') {
                    slipIcon.style.fill = '#ff9500'; // 더 미끄러움: 주황색
                } else if (slipVal === '3') {
                    slipIcon.style.fill = '#ff3b30'; // 완전 미끄러움: 빨간색
                } else {
                    slipIcon.style.fill = '#8e8e93'; // 정상노면: 회색 기본
                }
            }
        }
    </script>
</body>
</html>
