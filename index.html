<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>PM Safety Dashboard</title>
    <style>
        /* 1. 기본 스타일 (애플 다크 모드 테마) */
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: -apple-system, BlinkMacSystemFont, "Urbanist", "Segoe UI", Roboto, sans-serif;
        }
        body {
            background-color: #000000;
            color: #ffffff;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            overflow: hidden;
        }

        /* 2. 대시보드 메인 컨테이너 */
        .container {
            display: flex;
            width: 100vw;
            height: 100vh;
            flex-direction: column; /* 세로모드 기본 */
            padding: 20px;
            gap: 20px;
        }

        /* 3. 가로모드 전용 레이아웃 (Slide 11 디자인 반영) */
        @media (orientation: landscape) {
            .container {
                flex-direction: row; /* 가로로 배치 */
                padding: 30px;
                gap: 30px;
            }
            .display-panel {
                flex: 2; /* 왼쪽 데이터 패널을 넓게 */
            }
            .control-panel {
                flex: 0.7; /* 오른쪽 버튼 패널을 적절하게 */
                flex-direction: column;
            }
            .connect-btn {
                height: 100% !important; /* 버튼이 세로로 꽉 차도록 */
                writing-mode: vertical-lr; /* 버튼 글자 세로 방향 (선택사항) */
                text-orientation: upright;
                letter-spacing: 5px;
                font-size: 20px !important;
            }
        }

        /* 4. 왼쪽 디스플레이 패널 (데이터 영역) */
        .display-panel {
            background-color: #111111;
            border-radius: 35px;
            border: 2px solid #222222;
            padding: 40px;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            flex-grow: 1;
        }

        /* 속도 표시부 */
        .speed-header {
            display: flex;
            justify-content: space-between;
            align-items: flex-end;
            width: 100%;
        }
        .current-speed-group {
            text-align: left;
        }
        .safe-speed-group {
            text-align: right;
        }
        .label {
            font-size: 14px;
            font-weight: 600;
            color: #888888;
            margin-bottom: 10px;
            display: block;
        }
        .current-speed {
            font-size: 130px;
            font-weight: 800;
            line-height: 1;
            letter-spacing: -5px;
            color: #ffffff;
        }
        .safe-speed {
            font-size: 65px;
            font-weight: 700;
            line-height: 1;
            color: #ff3b30; /* 안전 속도는 레드 */
        }

        /* 하단 아이콘 영역 */
        .icon-footer {
            display: flex;
            justify-content: center;
            gap: 60px;
            border-top: 1px solid #222222;
            padding-top: 30px;
        }
        .icon-svg {
            width: 38px;
            height: 38px;
            fill: #333333; /* 초기 비활성 색상 */
            transition: all 0.4s ease;
        }

        /* 5. 오른쪽 컨트롤 패널 (버튼 영역) */
        .control-panel {
            display: flex;
            flex-grow: 1;
        }
        .connect-btn {
            width: 100%;
            height: 80px; /* 세로모드일 때 높이 */
            background-color: #0071e3;
            color: #ffffff;
            border: none;
            border-radius: 30px;
            font-size: 18px;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.3s ease;
            display: flex;
            justify-content: center;
            align-items: center;
            box-shadow: 0 10px 20px rgba(0, 113, 227, 0.2);
        }
        .connect-btn.active {
            background-color: #34c759; /* 연결 시 초록색 */
            box-shadow: 0 10px 20px rgba(52, 199, 89, 0.2);
        }
    </style>
</head>
<body>

    <div class="container">
        
        <div class="display-panel">
            <div class="speed-header">
                <div class="current-speed-group">
                    <span class="label">CURRENT SPEED</span>
                    <div id="currentSpeed" class="current-speed">--</div>
                </div>
                <div class="safe-speed-group">
                    <span class="label" style="color: #ff3b30;">SAFE LIMIT</span>
                    <div id="safeSpeed" class="safe-speed">--</div>
                </div>
            </div>

            <div class="icon-footer">
                <svg id="lightIcon" class="icon-svg" viewBox="0 0 24 24">
                    <path d="M12 2C8.14 2 5 5.14 5 9c0 2.38 1.19 4.47 3 5.74V17c0 .55.45 1 1 1h6c.55 0 1-.45 1-1v-2.26c1.81-1.27 3-3.36 3-5.74 0-3.86-3.14-7-7-7zm2.5 19H9.5c-.55 0-1 .45-1 1s.45 1 1 1h5c.55 0 1-.45 1-1s-.45-1-1-1z"/>
                </svg>
                <svg id="rainIcon" class="icon-svg" viewBox="0 0 24 24">
                    <path d="M12 2.69l5.66 5.66a8 8 0 1 1-11.31 0z"/>
                </svg>
                <svg id="slipIcon" class="icon-svg" viewBox="0 0 24 24">
                    <path d="M1 21h22L12 2 1 21zm12-3h-2v-2h2v2zm0-4h-2v-4h2v4z"/>
                </svg>
            </div>
        </div>

        <div class="control-panel">
            <button id="connectBtn" class="connect-btn" onclick="connectBLE()">블루투스 연결</button>
        </div>

    </div>

    <script>
        let characteristic = null;

        async function connectBLE() {
            const btn = document.getElementById('connectBtn');
            try {
                const device = await navigator.bluetooth.requestDevice({
                    filters: [{ services: ['0000ffe0-0000-1000-8000-00805f9b34fb'] }]
                });
                const server = await device.gatt.connect();
                const service = await server.getPrimaryService('0000ffe0-0000-1000-8000-00805f9b34fb');
                characteristic = await service.getCharacteristic('0000ffe1-0000-1000-8000-00805f9b34fb');
                
                btn.innerText = '시스템 가동 중';
                btn.classList.add('active');

                await characteristic.startNotifications();
                characteristic.addEventListener('characteristicvaluechanged', handleDataChanged);
            } catch (error) {
                console.log(error);
                alert("연결 실패: " + error.message);
            }
        }

        function handleDataChanged(event) {
            const value = event.target.value;
            const decoder = new TextDecoder('utf-8');
            const decodedData = decoder.decode(value).trim();
            
            const dataArray = decodedData.split(',');
            
            if (dataArray.length >= 5) {
                const safeSpeed = dataArray[0];
                const currentSpeed = dataArray[1];
                const lightVal = Number(dataArray[2]);
                const rainVal = dataArray[3].trim();
                const slipVal = dataArray[4].trim();

                // 1. 속도 업데이트 (브레이크 문구 포함)
                document.getElementById('safeSpeed').innerText = safeSpeed;
                document.getElementById('currentSpeed').innerText = currentSpeed;
                
                // 브레이크 상황 시 폰트 크기 조절
                if(currentSpeed === "브레이크") {
                    document.getElementById('currentSpeed').style.fontSize = "60px";
                } else {
                    document.getElementById('currentSpeed').style.fontSize = "130px";
                }

                // 2. 조도(환경) 아이콘 색상
                const lightIcon = document.getElementById('lightIcon');
                if (lightVal < 300) {
                    lightIcon.style.fill = '#ff3b30'; // 빨간색
                    lightIcon.style.filter = 'drop-shadow(0 0 8px #ff3b30)';
                } else {
                    lightIcon.style.fill = '#333333';
                    lightIcon.style.filter = 'none';
                }

                // 3. 강수 아이콘 색상
                const rainIcon = document.getElementById('rainIcon');
                if (rainVal === '1') {
                    rainIcon.style.fill = '#007aff'; // 파란색
                    rainIcon.style.filter = 'drop-shadow(0 0 8px #007aff)';
                } else {
                    rainIcon.style.fill = '#333333';
                    rainIcon.style.filter = 'none';
                }

                // 4. 노면 아이콘 색상
                const slipIcon = document.getElementById('slipIcon');
                if (slipVal === '1') slipIcon.style.fill = '#ffcc00';
                else if (slipVal === '2') slipIcon.style.fill = '#ff9500';
                else if (slipVal === '3') {
                    slipIcon.style.fill = '#ff3b30';
                    slipIcon.style.filter = 'drop-shadow(0 0 8px #ff3b30)';
                }
                else {
                    slipIcon.style.fill = '#333333';
                    slipIcon.style.filter = 'none';
                }
            }
        }
    </script>
</body>
</html>
