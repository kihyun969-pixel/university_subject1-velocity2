<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>PM Safety Dashboard</title>
    <style>
        /* 1. 기본 스타일 (오리지널 라이트 테마 유지) */
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
        }
        body {
            background-color: #f5f5f7;
            color: #1d1d1f;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
            transition: background-color 0.3s ease;
        }

        /* 2. 대시보드 메인 카드 */
        .container {
            background-color: #ffffff;
            padding: 35px 30px;
            border-radius: 32px;
            width: 100%;
            max-width: 380px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.03);
            display: flex;
            flex-direction: column;
            transition: background-color 0.3s ease, box-shadow 0.3s ease;
        }

        /* 3. 가로모드(Landscape) 레이아웃 대응 */
        @media (orientation: landscape) {
            .container {
                flex-direction: row;
                max-width: 680px;
                padding: 35px;
                gap: 25px;
            }
            .display-panel {
                flex: 2.2;
                justify-content: space-between;
            }
            .status-icon-section {
                margin-bottom: 0 !important;
            }
            .control-panel {
                flex: 0.45;
            }
            .connect-btn {
                height: 100% !important;
                writing-mode: vertical-lr;
                text-orientation: upright;
                letter-spacing: 6px;
                font-size: 15px !important;
                border-radius: 20px !important;
                padding: 0 !important;
            }
            /* 가로모드일 때 다크모드 버튼 간격 최적화 */
            .theme-toggle-btn {
                top: -15px !important;
                right: 0px !important;
            }
        }

        /* 4. 데이터 영역 내부 레이아웃 */
        .display-panel {
            display: flex;
            flex-direction: column;
            width: 100%;
            position: relative; /* 다크모드 버튼 배치를 위한 기준점 지정 */
        }
        .speed-section {
            margin-bottom: 25px;
            text-align: center;
        }
        .speed-row {
            display: flex;
            justify-content: center;
            align-items: flex-end;
        }
        .speed-box {
            padding: 0 15px;
        }
        .safe-speed-box {
            border-left: 1px solid #e5e5ea;
            transition: border-color 0.3s ease;
        }
        .label {
            font-size: 13px;
            font-weight: 600;
            color: #86868b;
            margin-bottom: 8px;
            display: block;
            transition: color 0.3s ease;
        }
        .current-speed {
            font-size: 110px;
            font-weight: 800;
            color: #1d1d1f;
            letter-spacing: -4px;
            line-height: 100px;
            transition: color 0.3s ease;
        }
        .safe-speed {
            font-size: 55px;
            font-weight: 700;
            color: #ff3b30;
            letter-spacing: -2px;
            line-height: 55px;
        }
        .unit {
            font-size: 18px;
            font-weight: 700;
            color: #1d1d1f;
            margin-top: 12px;
            transition: color 0.3s ease;
        }

        /* 5. 환경 아이콘 및 동적 이펙트 스타일 */
        .status-icon-section {
            display: flex;
            justify-content: center;
            width: 100%;
            margin-bottom: 25px;
            border-top: 1px solid #f2f2f7;
            border-bottom: 1px solid #f2f2f7;
            padding: 20px 0;
            transition: border-color 0.3s ease;
        }
        .icon-widget {
            margin: 0 22px;
            text-align: center;
        }
        .icon-svg {
            width: 32px;
            height: 32px;
            margin-bottom: 6px;
            fill: #8e8e93; /* 기본 라이트모드 소등 색상 */
            transition: all 0.3s ease;
        }
        .status-label {
            font-size: 11px;
            font-weight: 600;
            color: #a1a1a6;
        }

        /* [아이콘 상태별 실시간 컬러 체제 클래스] */
        .icon-svg.active-light {
            fill: #ff3b30 !important;
            filter: drop-shadow(0 0 6px rgba(255,59,48,0.5)) !important;
        }
        .icon-svg.active-rain {
            fill: #007aff !important;
            filter: drop-shadow(0 0 6px rgba(0,122,255,0.4)) !important;
        }
        .icon-svg.active-slip1 { fill: #ffcc00 !important; }
        .icon-svg.active-slip2 { fill: #ff9500 !important; }
        .icon-svg.active-slip3 {
            fill: #ff3b30 !important;
            filter: drop-shadow(0 0 6px rgba(255,59,48,0.5)) !important;
        }

        /* 6. 제어 버튼 */
        .control-panel {
            display: flex;
            width: 100%;
        }
        .connect-btn {
            background-color: #0071e3;
            color: #ffffff;
            border: none;
            padding: 14px 0;
            width: 100%;
            font-size: 15px;
            font-weight: 600;
            border-radius: 980px;
            cursor: pointer;
            transition: background-color 0.2s ease;
            display: flex;
            justify-content: center;
            align-items: center;
        }
        .connect-btn.active {
            background-color: #34c759;
        }

        /* 7. 미니멀 다크모드 전환 버튼 스타일 */
        .theme-toggle-btn {
            position: absolute;
            top: -15px;
            right: -10px;
            background-color: #e5e5ea;
            color: #1d1d1f;
            border: none;
            width: 34px;
            height: 34px;
            border-radius: 50%;
            cursor: pointer;
            font-size: 15px;
            display: flex;
            justify-content: center;
            align-items: center;
            box-shadow: 0 2px 8px rgba(0,0,0,0.06);
            transition: all 0.3s ease;
            z-index: 10;
        }

        /* ========================================================
           8. [핵심] 다크모드 역전 스타일 오버라이딩 (디자인 유지용)
        ======================================================== */
        body.dark-mode {
            background-color: #0a0a0c; /* 어두운 배경 */
        }
        body.dark-mode .container {
            background-color: #1c1c1e; /* 어두운 카드 상자 */
            box-shadow: 0 10px 40px rgba(0,0,0,0.3);
        }
        body.dark-mode .current-speed {
            color: #ffffff;
        }
        body.dark-mode .unit {
            color: #ffffff;
        }
        body.dark-mode .label {
            color: #8e8e93;
        }
        body.dark-mode .safe-speed-box {
            border-left-color: #2c2c2e;
        }
        body.dark-mode .status-icon-section {
            border-top-color: #2c2c2e;
            border-bottom-color: #2c2c2e;
        }
        body.dark-mode .icon-svg {
            fill: #48484a; /* 다크모드 시 미발광 센서는 더 어두운 회색으로 처리 */
        }
        body.dark-mode .theme-toggle-btn {
            background-color: #2c2c2e;
            color: #ffffff;
        }
    </style>
</head>
<body>

    <div class="container">
        
        <div class="display-panel">
            
            <button id="themeToggle" class="theme-toggle-btn" onclick="toggleTheme()">🌙</button>

            <div class="speed-section">
                <div class="speed-row">
                    <div class="speed-box">
                        <span class="label">현재 속도</span>
                        <div id="currentSpeed" class="current-speed">--</div>
                    </div>
                    <div class="speed-box safe-speed-box">
                        <span class="label">안전 속도</span>
                        <div id="safeSpeed" class="safe-speed">--</div>
                    </div>
                </div>
                <div class="unit">km/h</div>
            </div>

            <div class="status-icon-section">
                <div class="icon-widget">
                    <svg id="lightIcon" class="icon-svg" viewBox="0 0 24 24">
                        <path d="M12 2C8.14 2 5 5.14 5 9c0 2.38 1.19 4.47 3 5.74V17c0 .55.45 1 1 1h6c.55 0 1-.45 1-1v-2.26c1.81-1.27 3-3.36 3-5.74 0-3.86-3.14-7-7-7zm2.5 19H9.5c-.55 0-1 .45-1 1s.45 1 1 1h5c.55 0 1-.45 1-1s-.45-1-1-1z"/>
                    </svg>
                    <div class="status-label">환경</div>
                </div>

                <div class="icon-widget">
                    <svg id="rainIcon" class="icon-svg" viewBox="0 0 24 24">
                        <path d="M12 2.69l5.66 5.66a8 8 0 1 1-11.31 0z"/>
                    </svg>
                    <div class="status-label">강수</div>
                </div>

                <div class="icon-widget">
                    <svg id="slipIcon" class="icon-svg" viewBox="0 0 24 24">
                        <path d="M1 21h22L12 2 1 21zm12-3h-2v-2h2v2zm0-4h-2v-4h2v4z"/>
                    </svg>
                    <div class="status-label">노면</div>
                </div>
            </div>
        </div>

        <div class="control-panel">
            <button id="connectBtn" class="connect-btn" onclick="connectBLE()">블루투스 연결</button>
        </div>

    </div>

    <script>
        let characteristic = null;

        // 테마 토글 제어 스크립트
        function toggleTheme() {
            const body = document.body;
            const btn = document.getElementById('themeToggle');
            body.classList.toggle('dark-mode');
            
            if (body.classList.contains('dark-mode')) {
                btn.innerText = '☀️'; // 다크모드 진입 시 해 기호로 변환
            } else {
                btn.innerText = '🌙'; // 라이트모드 복귀 시 달 기호로 변환
            }
        }

        async function connectBLE() {
            const btn = document.getElementById('connectBtn');
            try {
                const device = await navigator.bluetooth.requestDevice({
                    filters: [{ services: ['0000ffe0-0000-1000-8000-00805f9b34fb'] }]
                });
                const server = await device.gatt.connect();
                const service = await server.getPrimaryService('0000ffe0-0000-1000-8000-00805f9b34fb');
                characteristic = await service.getCharacteristic('0000ffe1-0000-1000-8000-00805f9b34fb');
                
                btn.innerText = '시스템 가동 중';
                btn.classList.add('active');

                await characteristic.startNotifications();
                characteristic.addEventListener('characteristicvaluechanged', handleDataChanged);
            } catch (error) {
                console.log(error);
            }
        }

        function handleDataChanged(event) {
            const value = event.target.value;
            const decoder = new TextDecoder('utf-8');
            const decodedData = decoder.decode(value).trim();
            
            const dataArray = decodedData.split(',');
            
            if (dataArray.length >= 5) {
                const safeSpeed = dataArray[0];
                const currentSpeed = dataArray[1];
                const lightVal = Number(dataArray[2]);
                const rainVal = dataArray[3].trim();
                const slipVal = dataArray[4].trim();

                document.getElementById('safeSpeed').innerText = safeSpeed;
                document.getElementById('currentSpeed').innerText = currentSpeed;
                
                if(currentSpeed === "브레이크") {
                    document.getElementById('currentSpeed').style.fontSize = "50px";
                } else {
                    document.getElementById('currentSpeed').style.fontSize = "110px";
                }

                // 1. 조도(환경) 클래스 분기 제어
                const lightIcon = document.getElementById('lightIcon');
                if (lightVal < 300) {
                    lightIcon.classList.add('active-light');
                } else {
                    lightIcon.classList.remove('active-light');
                }

                // 2. 강수 클래스 분기 제어
                const rainIcon = document.getElementById('rainIcon');
                if (rainVal === '1') {
                    rainIcon.classList.add('active-rain');
                } else {
                    rainIcon.classList.remove('active-rain');
                }

                // 3. 노면 클래스 분기 제어
                const slipIcon = document.getElementById('slipIcon');
                slipIcon.classList.remove('active-slip1', 'active-slip2', 'active-slip3');
                if (slipVal === '1') {
                    slipIcon.classList.add('active-slip1');
                } else if (slipVal === '2') {
                    slipIcon.classList.add('active-slip2');
                } else if (slipVal === '3') {
                    slipIcon.classList.add('active-slip3');
                }
            }
        }
    </script>
</body>
</html>
