<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PM Safety Dashboard</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
        }
        body {
            background-color: #f5f5f7;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
        }
        .container {
            background-color: #ffffff;
            padding: 35px 30px;
            border-radius: 32px;
            width: 100%;
            max-width: 380px;
            text-align: center;
            box-shadow: 0 10px 40px rgba(0,0,0,0.03);
        }
        /* 가로모드 대응 (화면이 넓어지면 레이아웃 최적화) */
        @media (min-width: 600px) {
            .container {
                max-width: 600px;
                padding: 40px;
            }
        }
        
        /* 속도 레이아웃 */
        .speed-section {
            margin-bottom: 25px;
        }
        .speed-row {
            display: flex;
            justify-content: center;
            align-items: flex-end;
            width: 100%;
        }
        .speed-box {
            padding: 0 20px;
        }
        .safe-speed-box {
            border-left: 1px solid #e5e5ea;
        }
        .label {
            font-size: 13px;
            font-weight: '600';
            color: '#86868b';
            margin-bottom: 8px;
            display: block;
        }
        .current-speed {
            font-size: 110px;
            font-weight: 800;
            color: #1d1d1f;
            letter-spacing: -4px;
            line-height: 100px;
        }
        .safe-speed {
            font-size: 55px;
            font-weight: 700;
            color: #ff3b30;
            letter-spacing: -2px;
            line-height: 55px;
        }
        .unit {
            font-size: 18px;
            font-weight: 700;
            color: #1d1d1f;
            margin-top: 12px;
        }

        /* 상태 아이콘 섹션 */
        .status-icon-section {
            display: flex;
            justify-content: center;
            width: 100%;
            margin-bottom: 35px;
            border-top: 1px solid #f2f2f7;
            border-bottom: 1px solid #f2f2f7;
            padding: 20px 0;
        }
        .icon-widget {
            margin: 0 22px;
            text-align: center;
        }
        .status-icon {
            font-size: 28px;
            margin-bottom: 6px;
            color: #8e8e93; /* 초기 상태는 모두 회색 */
            transition: color 0.3s ease;
        }
        .status-label {
            font-size: 11px;
            font-weight: 600;
            color: #a1a1a6;
        }

        /* 애플 스타일 버튼 */
        .btn {
            background-color: #0071e3;
            color: #ffffff;
            border: none;
            padding: 14px 40px;
            font-size: 15px;
            font-weight: 600;
            border-radius: 980px;
            cursor: pointer;
            transition: background-color 0.2s ease;
        }
        .btn:active {
            background-color: #005bb5;
        }
        .status-log {
            font-size: 12px;
            color: #86868b;
            margin-top: 14px;
        }
    </style>
</head>
<body>

    <div class="container">
        
        <div class="speed-section">
            <div class="speed-row">
                <div class="speed-box">
                    <span class="label">현재 속도</span>
                    <div id="currentSpeed" class="current-speed">--</div>
                </div>
                <div class="speed-box safe-speed-box">
                    <span class="label">안전 속도</span>
                    <div id="safeSpeed" class="safe-speed">--</div>
                </div>
            </div>
            <div class="unit">km/h</div>
        </div>

        <div class="status-icon-section">
            <div class="icon-widget">
                <div id="lightIcon" class="status-icon">💡</div>
                <div class="status-label">환경</div>
            </div>

            <div class="icon-widget">
                <div id="rainIcon" class="status-icon">💧</div>
                <div class="status-label">강수</div>
            </div>

            <div class="icon-widget">
                <div id="slipIcon" class="status-icon">⚠️</div>
                <div class="status-label">노면</div>
            </div>
        </div>

        <button id="connectBtn" class="btn" onclick="connectBLE()">블루투스 연결</button>
        <div id="statusLog" class="status-log">Wait for connection...</div>

    </div>

    <script>
        let bluetoothDevice = null;
        let characteristic = null;

        // 웹 블루투스 연결 함수 (Bluefy 앱에서 실행 시 작동)
        async function connectBLE() {
            const statusLog = document.getElementById('statusLog');
            const connectBtn = document.getElementById('connectBtn');
            
            statusLog.innerText = 'Scanning...';
            
            try {
                // 아두이노 BLE 서비스 UUID 탐색
                const device = await navigator.bluetooth.requestDevice({
                    filters: [{ services: ['0000ffe0-0000-1000-8000-00805f9b34fb'] }]
                });
                
                statusLog.innerText = 'Connecting...';
                const server = await device.gatt.connect();
                const service = await server.getPrimaryService('0000ffe0-0000-1000-8000-00805f9b34fb');
                characteristic = await service.getCharacteristic('0000ffe1-0000-1000-8000-00805f9b34fb');
                
                statusLog.innerText = 'Connected!';
                connectBtn.innerText = '시스템 가동 중';
                connectBtn.style.backgroundColor = '#34c759';

                // 데이터 실시간 수신 시작
                await characteristic.startNotifications();
                characteristic.addEventListener('characteristicvaluechanged', handleDataChanged);
                
            } catch (error) {
                statusLog.innerText = 'Error: ' + error.message;
                console.error(error);
            }
        }

        // 데이터 수신 및 UI 동적 변경 핵심 로직
        function handleDataChanged(event) {
            const value = event.target.value;
            const decoder = new TextDecoder('utf-8');
            const decodedData = decoder.decode(value).trim();
            
            // 데이터 파싱: "안전속도,현재속도,조도값,빗물값,미끄러움레벨"
            const dataArray = decodedData.split(',');
            
            if (dataArray.length >= 5) {
                const safeSpeed = dataArray[0];
                const currentSpeed = dataArray[1];
                const lightVal = Number(dataArray[2]);
                const rainVal = dataArray[3];
                const slipVal = dataArray[4];

                // 1. 속도 텍스트 갱신
                document.getElementById('safeSpeed').innerText = safeSpeed;
                document.getElementById('currentSpeed').innerText = currentSpeed;

                // 2. 조도 센서 아이콘 색상 변경 (낮: 회색, 밤[300 미만]: 빨간색)
                const lightIcon = document.getElementById('lightIcon');
                if (lightVal < 300) {
                    lightIcon.style.color = '#ff3b30';
                } else {
                    lightIcon.style.color = '#8e8e93';
                }

                // 3. 강수 센서 아이콘 색상 변경 (비 옴['1']: 파란색, 안 옴['0']: 회색)
                const rainIcon = document.getElementById('rainIcon');
                if (rainVal === '1') {
                    rainIcon.style.color = '#007aff';
                } else {
                    rainIcon.style.color = '#8e8e93';
                }

                // 4. 노면 미끄러움 아이콘 색상 변경 (0:회색, 1:노란색, 2:주황색, 3:빨간색)
                const slipIcon = document.getElementById('slipIcon');
                if (slipVal === '1') {
                    slipIcon.style.color = '#ffcc00'; // 약간 미끄러움 (노란색)
                } else if (slipVal === '2') {
                    slipIcon.style.color = '#ff9500'; // 더 미끄러움 (주황색)
                } else if (slipVal === '3') {
                    slipIcon.style.color = '#ff3b30'; // 완전 미끄러움 (빨간색)
                } else {
                    slipIcon.style.color = '#8e8e93'; // 정상 (회색)
                }
            }
        }
    </script>
</body>
</html>
