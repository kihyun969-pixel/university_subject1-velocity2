<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>PM Safety Dashboard</title>
    <style>
        /* 1. 기본 스타일 (흰색 바탕 라이트 테마 유지) */
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
        }
        body {
            background-color: #f5f5f7;
            color: #1d1d1f;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
        }

        /* 2. 대시보드 메인 카드 */
        .container {
            background-color: #ffffff;
            padding: 35px 30px;
            border-radius: 32px;
            width: 100%;
            max-width: 380px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.03);
            display: flex;
            flex-direction: column;
            transition: all 0.3s ease;
        }

        /* 3. 가로모드(Landscape) 레이아웃 - 버튼 슬림화 적용 */
        @media (orientation: landscape) {
            .container {
                flex-direction: row;
                max-width: 680px; /* 시인성을 위해 전체 가로폭 살짝 조정 */
                padding: 35px;
                gap: 25px;
            }
            .display-panel {
                flex: 2.2; /* 왼쪽 데이터 영역을 훨씬 더 넓게 할당 */
                justify-content: space-between;
            }
            .status-icon-section {
                margin-bottom: 0 !important;
            }
            .control-panel {
                flex: 0.45; /* ★ 핵심 수정: 기존 0.8에서 0.45로 줄여 버튼을 가로로 슬림하게 변경 */
            }
            .connect-btn {
                height: 100% !important; /* 세로로 꽉 차는 피드백은 그대로 유지 */
                writing-mode: vertical-lr;
                text-orientation: upright;
                letter-spacing: 6px; /* 슬림해진 폭에 맞춰 글자 간격 조정 */
                font-size: 15px !important; /* 폰트 크기 최적화 */
                border-radius: 20px !important;
                padding: 0 !important;
            }
        }

        /* 4. 데이터 영역 내부 레이아웃 */
        .display-panel {
            display: flex;
            flex-direction: column;
            width: 100%;
        }
        .speed-section {
            margin-bottom: 25px;
            text-align: center;
        }
        .speed-row {
            display: flex;
            justify-content: center;
            align-items: flex-end;
        }
        .speed-box {
            padding: 0 15px;
        }
        .safe-speed-box {
            border-left: 1px solid #e5e5ea;
        }
        .label {
            font-size: 13px;
            font-weight: 600;
            color: #86868b;
            margin-bottom: 8px;
            display: block;
        }
        .current-speed {
            font-size: 110px;
            font-weight: 800;
            color: #1d1d1f;
            letter-spacing: -4px;
            line-height: 100px;
        }
        .safe-speed {
            font-size: 55px;
            font-weight: 700;
            color: #ff3b30;
            letter-spacing: -2px;
            line-height: 55px;
        }
        .unit {
            font-size: 18px;
            font-weight: 700;
            color: #1d1d1f;
            margin-top: 12px;
        }

        /* 5. 환경 아이콘 레이아웃 */
        .status-icon-section {
            display: flex;
            justify-content: center;
            width: 100%;
            margin-bottom: 25px;
            border-top: 1px solid #f2f2f7;
            border-bottom: 1px solid #f2f2f7;
            padding: 20px 0;
        }
        .icon-widget {
            margin: 0 22px;
            text-align: center;
        }
        .icon-svg {
            width: 32px;
            height: 32px;
            margin-bottom: 6px;
            fill: #8e8e93;
            transition: all 0.3s ease;
        }
        .status-label {
            font-size: 11px;
            font-weight: 600;
            color: #a1a1a6;
        }

        /* 6. 제어 버튼 레이아웃 */
        .control-panel {
            display: flex;
            width: 100%;
        }
        .connect-btn {
            background-color: #0071e3;
            color: #ffffff;
            border: none;
            padding: 14px 0;
            width: 100%;
            font-size: 15px;
            font-weight: 600;
            border-radius: 980px;
            cursor: pointer;
            transition: background-color 0.2s ease;
            display: flex;
            justify-content: center;
            align-items: center;
        }
        .connect-btn.active {
            background-color: #34c759;
        }
    </style>
</head>
<body>

    <div class="container">
        
        <div class="display-panel">
            <div class="speed-section">
                <div class="speed-row">
                    <div class="speed-box">
                        <span class="label">현재 속도</span>
                        <div id="currentSpeed" class="current-speed">--</div>
                    </div>
                    <div class="speed-box safe-speed-box">
                        <span class="label">안전 속도</span>
                        <div id="safeSpeed" class="safe-speed">--</div>
                    </div>
                </div>
                <div class="unit">km/h</div>
            </div>

            <div class="status-icon-section">
                <div class="icon-widget">
                    <svg id="lightIcon" class="icon-svg" viewBox="0 0 24 24">
                        <path d="M12 2C8.14 2 5 5.14 5 9c0 2.38 1.19 4.47 3 5.74V17c0 .55.45 1 1 1h6c.55 0 1-.45 1-1v-2.26c1.81-1.27 3-3.36 3-5.74 0-3.86-3.14-7-7-7zm2.5 19H9.5c-.55 0-1 .45-1 1s.45 1 1 1h5c.55 0 1-.45 1-1s-.45-1-1-1z"/>
                    </svg>
                    <div class="status-label">환경</div>
                </div>

                <div class="icon-widget">
                    <svg id="rainIcon" class="icon-svg" viewBox="0 0 24 24">
                        <path d="M12 2.69l5.66 5.66a8 8 0 1 1-11.31 0z"/>
                    </svg>
                    <div class="status-label">강수</div>
                </div>

                <div class="icon-widget">
                    <svg id="slipIcon" class="icon-svg" viewBox="0 0 24 24">
                        <path d="M1 21h22L12 2 1 21zm12-3h-2v-2h2v2zm0-4h-2v-4h2v4z"/>
                    </svg>
                    <div class="status-label">노면</div>
                </div>
            </div>
        </div>

        <div class="control-panel">
            <button id="connectBtn" class="connect-btn" onclick="connectBLE()">블루투스 연결</button>
        </div>

    </div>

    <script>
        let characteristic = null;

        async function connectBLE() {
            const btn = document.getElementById('connectBtn');
            try {
                const device = await navigator.bluetooth.requestDevice({
                    filters: [{ services: ['0000ffe0-0000-1000-8000-00805f9b34fb'] }]
                });
                const server = await device.gatt.connect();
                const service = await server.getPrimaryService('0000ffe0-0000-1000-8000-00805f9b34fb');
                characteristic = await service.getCharacteristic('0000ffe1-0000-1000-8000-00805f9b34fb');
                
                btn.innerText = '시스템 가동 중';
                btn.classList.add('active');

                await characteristic.startNotifications();
                characteristic.addEventListener('characteristicvaluechanged', handleDataChanged);
            } catch (error) {
                console.log(error);
            }
        }

        function handleDataChanged(event) {
            const value = event.target.value;
            const decoder = new TextDecoder('utf-8');
            const decodedData = decoder.decode(value).trim();
            
            const dataArray = decodedData.split(',');
            
            if (dataArray.length >= 5) {
                const safeSpeed = dataArray[0];
                const currentSpeed = dataArray[1];
                const lightVal = Number(dataArray[2]);
                const rainVal = dataArray[3].trim();
                const slipVal = dataArray[4].trim();

                document.getElementById('safeSpeed').innerText = safeSpeed;
                document.getElementById('currentSpeed').innerText = currentSpeed;
                
                if(currentSpeed === "브레이크") {
                    document.getElementById('currentSpeed').style.fontSize = "50px";
                } else {
                    document.getElementById('currentSpeed').style.fontSize = "110px";
                }

                const lightIcon = document.getElementById('lightIcon');
                if (lightVal < 300) {
                    lightIcon.style.fill = '#ff3b30';
                    lightIcon.style.filter = 'drop-shadow(0 0 6px rgba(255,59,48,0.5))';
                } else {
                    lightIcon.style.fill = '#8e8e93';
                    lightIcon.style.filter = 'none';
                }

                const rainIcon = document.getElementById('rainIcon');
                if (rainVal === '1') {
                    rainIcon.style.fill = '#007aff';
                    rainIcon.style.filter = 'drop-shadow(0 0 6px rgba(0,122,255,0.4))';
                } else {
                    rainIcon.style.fill = '#8e8e93';
                    rainIcon.style.filter = 'none';
                }

                const slipIcon = document.getElementById('slipIcon');
                if (slipVal === '1') {
                    slipIcon.style.fill = '#ffcc00';
                    slipIcon.style.filter = 'none';
                } else if (slipVal === '2') {
                    slipIcon.style.fill = '#ff9500';
                    slipIcon.style.filter = 'none';
                } else if (slipVal === '3') {
                    slipIcon.style.fill = '#ff3b30';
                    slipIcon.style.filter = 'drop-shadow(0 0 6px rgba(255,59,48,0.5))';
                } else {
                    slipIcon.style.fill = '#8e8e93';
                    slipIcon.style.filter = 'none';
                }
            }
        }
    </script>
</body>
</html>
