<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PM 안전 속도 안내 시스템</title>
    <style>
        /* [Apple Style 기본 베이스] 구글/애플 시스템 서체 및 연한 회색 배경 */
        body { 
            margin: 0;
            padding: 0;
            font-family: -apple-system, BlinkMacSystemFont, "SF Pro Display", "SF Pro Text", "Helvetica Neue", Helvetica, Arial, sans-serif;
            background-color: #f5f5f7; /* 애플 고유의 라이트 그레이 */
            color: #1d1d1f; 
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }

        /* [메인 카드 패널] 부드러운 모서리와 은은한 그림자 */
        .container { 
            background-color: #ffffff; 
            padding: 45px 30px; 
            border-radius: 24px; 
            box-shadow: 0 10px 40px rgba(0,0,0,0.03); 
            width: 85%;
            max-width: 360px; 
            text-align: center;
            transition: all 0.4s cubic-bezier(0.25, 1, 0.5, 1);
        }

        /* 타이틀: 애플 스타일의 차분한 서브 텍스트 */
        h2 { 
            font-size: 20px; 
            font-weight: 600; 
            color: #86868b; /* 애플 미디움 그레이 */
            margin: 0 0 8px 0; 
            letter-spacing: -0.5px;
        }

        /* 속도 숫자: 굵고 거대하게 강조 */
        .speed-display { 
            font-size: 110px; 
            font-weight: 700; 
            color: #ff3b30; /* 시인성이 높은 애플 레드 */
            line-height: 1; 
            margin: 5px 0; 
            letter-spacing: -3px;
        }

        /* 단위 표시 */
        .unit { 
            font-size: 22px; 
            font-weight: 600; 
            color: #1d1d1f; 
            margin-bottom: 35px;
        }

        /* [Apple Style 알약 모양 버튼] 블루 고유 컬러와 둥근 엣지 */
        button { 
            background-color: #0071e3; /* 애플 링크 블루 */
            color: white; 
            font-size: 15px; 
            font-weight: 500; 
            padding: 14px 32px; 
            border: none; 
            border-radius: 980px; 
            cursor: pointer; 
            transition: all 0.2s ease;
            box-shadow: 0 4px 12px rgba(0, 113, 227, 0.15);
        }

        button:active { 
            background-color: #0062c3; 
            transform: scale(0.97); /* 누를 때 쫀득한 클릭감 추가 */
        }

        /* 로그 메시지 창 */
        .status { 
            color: #86868b; 
            font-size: 13px; 
            margin-top: 15px; 
            margin-bottom: 0;
            font-weight: 400;
        }

        /* ==========================================================================
           [핵심] 스마트폰 가로모드(Landscape) 최적화 스타일 
           ========================================================================== */
        @media (orientation: landscape) {
            .container { 
                max-width: 640px; 
                width: 90%;
                padding: 35px 50px;
                display: flex; /* 가로로 정렬 방식 전환 */
                flex-direction: row;
                align-items: center;
                justify-content: space-between;
                text-align: left;
            }
            
            .main-info {
                flex: 1.2;
            }
            
            .control-info {
                flex: 0.8;
                display: flex;
                flex-direction: column;
                align-items: flex-end; /* 우측 정렬 */
                justify-content: center;
            }

            h2 { 
                font-size: 22px; 
                margin-bottom: 0px;
            }

            /* 가로모드일 때 숫자를 훨씬 더 대형화(140px)하여 가시성 확보 */
            .speed-display { 
                font-size: 140px; 
                margin: -5px 0;
            }

            .unit { 
                font-size: 24px; 
                margin-bottom: 0;
                margin-top: -5px;
            }

            button {
                font-size: 16px;
                padding: 16px 36px;
            }

            .status {
                text-align: right;
                margin-top: 12px;
            }
        }
    </style>
</head>
<body>

<div class="container">
    <div class="main-info">
        <h2>현재 구역 안전 속도</h2>
        <div class="speed-display" id="speedLimit">--</div>
        <div class="unit">km/h</div>
    </div>
    
    <div class="control-info">
        <button onclick="connectBLE()">블루투스 연결하기</button>
        <p class="status" id="statusLog">연결 대기 중...</p>
    </div>
</div>

<script>
const UUID_SERVICE = "0000ffe0-0000-1000-8000-00805f9b34fb";
const UUID_CHARACTERISTIC = "0000ffe1-0000-1000-8000-00805f9b34fb";

let bluetoothDevice = null;
let rxCharacteristic = null;

async function connectBLE() {
    const log = document.getElementById('statusLog');
    try {
        log.innerText = "기기 검색 중...";
        bluetoothDevice = await navigator.bluetooth.requestDevice({
            acceptAllDevices: true,
            optionalServices: [UUID_SERVICE]
        });

        log.innerText = "서버 연결 중...";
        const server = await bluetoothDevice.gatt.connect();

        log.innerText = "서비스 가져오는 중...";
        const service = await server.getPrimaryService(UUID_SERVICE);

        log.innerText = "특성 가져오는 중...";
        rxCharacteristic = await service.getCharacteristic(UUID_CHARACTERISTIC);

        await rxCharacteristic.startNotifications();
        rxCharacteristic.addEventListener('characteristicvaluechanged', handleDataReceived);

        log.innerText = "연결 성공! 수신 중...";
    } catch (error) {
        log.innerText = "오류 발생: " + error;
        console.error(error);
    }
}

function handleDataReceived(event) {
    const value = event.target.value;
    const decoder = new TextDecoder('utf-8');
    const receivedData = decoder.decode(value).trim(); 
    
    console.log("아두이노가 보낸 값:", receivedData);
    
    if (receivedData.length > 0) {
        document.getElementById('speedLimit').innerText = receivedData;
    }
}
</script>
</body>
</html>
